start:
  welcome: |
    👋 <b>Welcome to Yoink Bot!</b>

    Send me any video/audio/image link and I'll download it for you.

    Use /help to see all commands.
  subscribe_required: |
    <i>To use this bot you need to subscribe to {channel} Telegram channel.</i>
    After you join, <b>resend your link</b> ❤️

help:
  text: |
    <blockquote>🎬 <b>Yoink Bot - Help</b>

    📥 <b>Basic Usage:</b>
    • Send any link → bot downloads it
    • <code>/audio URL</code> → extract audio only
    • <code>/link [quality] URL</code> → get direct stream links
    • <code>/list URL</code> → show all available formats

    📋 <b>Playlists &amp; Ranges:</b>
    • <code>URL*1*5</code> → first 5 items
    • <code>URL*-1*-5</code> → last 5 items
    • <code>/vid 3-7 URL</code> → items 3 to 7

    🍪 <b>Cookies:</b>
    • Upload a <code>.txt</code> cookie file for private content
    • <code>/cookie</code> → manage cookies

    ⚙️ <b>Settings:</b>
    • <code>/format</code> → quality, codec, container
    • <code>/subs</code> → subtitles
    • <code>/proxy</code> → proxy toggle
    • <code>/settings</code> → all settings
    </blockquote>

